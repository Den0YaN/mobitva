<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Авторизация - Автобаттл MMO</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head>
<body>
<div class="wrapper">
    <div class="header-wrapper"><a href="https://mobitva.net" target="_blank">mobitva.net</a><div class="site-title">⚔️ АВТОРИЗАЦИЯ ⚔️</div><a href="https://mmobitva.ru" target="_blank">mmobitva.ru</a></div>
    <div class="auth-container">
        <div class="auth-box">
            <div class="auth-icon">🔐</div>
            <div class="auth-title">Вход в систему</div>
            <div class="auth-subtitle">Введите данные для входа</div>
            <div class="auth-input-group"><label>👤 Логин</label><input type="text" id="login" placeholder="Логин"></div>
            <div class="auth-input-group"><label>🔒 Пароль</label><input type="password" id="password" placeholder="Пароль"></div>
            <button class="auth-btn" id="loginBtn">Войти</button>
            <div class="auth-error" id="errorMsg"></div>
            <div class="auth-links">Нет аккаунта? <a href="register.html">Зарегистрироваться</a></div>
        </div>
    </div>
</div>
<script src="js/db.js"></script>
<script src="js/common.js"></script>
<script>
    window.doLogin = async function() {
        const login = document.getElementById('login').value.trim();
        const password = document.getElementById('password').value;
        const errorMsg = document.getElementById('errorMsg');
        if(!login || !password) {
            errorMsg.textContent = '❌ Введите логин и пароль!';
            errorMsg.style.display = 'block';
            setTimeout(() => errorMsg.style.display = 'none', 3000);
            return;
        }
        const user = await loginUser(login, password);
        if(user) {
            localStorage.setItem('user', JSON.stringify({ login: user.login, role: user.role, name: user.name, isAuth: true }));
            window.location.href = 'main.html';
        } else {
            errorMsg.textContent = '❌ Неверный логин или пароль!';
            errorMsg.style.display = 'block';
            setTimeout(() => errorMsg.style.display = 'none', 3000);
        }
    };
    document.getElementById('loginBtn').onclick = () => window.doLogin();
    if(localStorage.getItem('user')) window.location.href = 'main.html';
</script>
</body>
</html>
