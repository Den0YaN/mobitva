<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Круги Демона - Автобаттл MMO</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="wrapper">
        <!-- ================= ADMIN PANEL ================= -->
        <div id="adminPanel" style="display:none;">
            <div class="admin-panel">
                <div class="admin-info">
                    <div class="admin-avatar">👑</div>
                    <div>
                        <div class="admin-name" id="adminName"></div>
                        <div class="admin-role">Администратор</div>
                    </div>
                    <div class="admin-badge">ADMIN</div>
                </div>
                <div class="admin-actions">
                    <button class="admin-btn" onclick="openAdminPanel()">⚙️ Управление</button>
                    <button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            </div>
        </div>
        <div id="userPanel" style="display:none;">
            <div class="admin-panel">
                <div class="admin-info">
                    <div class="admin-avatar">👤</div>
                    <div>
                        <div class="admin-name" id="userName"></div>
                        <div class="admin-role">Пользователь</div>
                    </div>
                </div>
                <div class="admin-actions">
                    <button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button>
                </div>
            </div>
        </div>
        <!-- ================================================ -->

        <div class="header-wrapper">
            <a href="https://mobitva.net" target="_blank">mobitva.net</a>
            <div class="site-title">🛡️ КРУГИ ДЕМОНА 🛡️</div>
            <a href="https://mmobitva.ru" target="_blank">mmobitva.ru</a>
        </div>

        <div class="categories">
            <button class="cat-btn" onclick="location.href='index.html'">🏠 Главная</button>
            <button class="cat-btn" onclick="location.reload()">🔄 Обновить</button>
        </div>

        <div class="circles-grid" id="circles-container"></div>
    </div>

    <!-- ================ MODAL ================= -->
    <div id="demonModal" class="demon-modal" style="display:none!important">
        <div class="demon-modal-content">
            <div class="demon-modal-header">
                <div class="demon-modal-close" onclick="closeDemonModal()">✕</div>
                <div class="demon-modal-icon">
                    <div class="item-icon shop-icon" id="modalIcon"
                        style="width:80px;height:80px;background-image:url('img/shop.png');background-repeat:no-repeat;">
                    </div>
                </div>
                <div class="demon-modal-title" id="modalTitle"></div>
                <div class="demon-modal-subtitle" id="modalSubtitle"></div>
            </div>
            <div class="demon-modal-body">
                <div class="demon-modal-stats">
                    <div class="demon-modal-stats-title">📊 ХАРАКТЕРИСТИКИ</div>
                    <div id="modalStats"></div>
                </div>
                <div class="demon-modal-description" id="modalDescription"></div>
            </div>
            <div class="demon-modal-footer">
                <button class="demon-modal-btn" onclick="closeDemonModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <!-- ================= SCRIPTS ================= -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <script src="js/common.js"></script>
    <script src="js/statico.js"></script> <!-- подключаем новый statico.js -->

    <script>
        const currentUser = checkAuth(); 
        if(!currentUser) window.location.href = 'auth.html';

        let demonCircles = {};

        async function loadCircles() {
            const data = await getDemons();
            demonCircles = {};
            data.forEach(d => { demonCircles[d.id] = d; });
        }

        async function renderCircles() {
            await loadCircles();
            const container = document.getElementById('circles-container');
            if(!container) return;

            container.innerHTML = '';
            Object.entries(demonCircles).forEach(([id, circle]) => {
                const card = document.createElement('div');
                card.classList.add('circle-card');
                card.onclick = () => openDemonModal(id);

                // header
                const header = document.createElement('div');
                header.classList.add('circle-header');

                const icon = document.createElement('div');
                icon.classList.add('circle-icon', 'shop-icon');
                icon.style.setProperty('--row', circle.icon_row);
                icon.style.setProperty('--col', circle.icon_col);

                const title = document.createElement('div');
                title.classList.add('circle-title');
                title.innerHTML = `<div class="circle-name">${escapeHtml(circle.name)}</div>
                                   <div class="circle-level">⭐ Уровень ${circle.level}</div>`;

                header.appendChild(icon);
                header.appendChild(title);

                // stats
                const statsContainer = document.createElement('div');
                statsContainer.classList.add('circle-stats');
                renderStats(circle.stats, statsContainer); // используем statico.js

                // description
                const description = document.createElement('div');
                description.classList.add('circle-description');
                description.textContent = circle.description;

                card.appendChild(header);
                card.appendChild(statsContainer);
                card.appendChild(description);

                container.appendChild(card);
            });
        }

        function openDemonModal(id) {
            const circle = demonCircles[id];
            if(!circle) return;

            const iconEl = document.getElementById('modalIcon');
            iconEl.style.backgroundPosition = `-${circle.icon_col * 80}px -${circle.icon_row * 80}px`;

            document.getElementById('modalTitle').innerText = circle.name;
            document.getElementById('modalSubtitle').innerHTML = `⭐ Уровень ${circle.level}`;
            document.getElementById('modalDescription').innerHTML = circle.description;

            const statsContainer = document.getElementById('modalStats');
            renderStats(circle.stats, statsContainer); // statico.js для модалки

            document.getElementById('demonModal').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeDemonModal() {
            document.getElementById('demonModal').style.display = 'none';
            document.body.style.overflow = '';
        }

        renderCircles();
        document.addEventListener('DOMContentLoaded', displayAdminPanel);
    </script>
</body>

</html>
