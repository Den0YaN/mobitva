<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Главная - Автобаттл MMO</title><link rel="stylesheet" href="style.css"></head>
<body>
<div class="wrapper">
    <div id="adminPanel" style="display:none;"><div class="admin-panel"><div class="admin-info"><div class="admin-avatar">👑</div><div><div class="admin-name" id="adminName"></div><div class="admin-role">Администратор</div></div><div class="admin-badge">ADMIN</div></div><div class="admin-actions"><button class="admin-btn" onclick="openAdminPanel()">⚙️ Управление</button><button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button></div></div></div>
    <div id="userPanel" style="display:none;"><div class="admin-panel"><div class="admin-info"><div class="admin-avatar">👤</div><div><div class="admin-name" id="userName"></div><div class="admin-role">Пользователь</div></div></div><div class="admin-actions"><button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button></div></div></div>
    <div class="header-wrapper"><a href="https://mobitva.net" target="_blank">mobitva.net</a><div class="site-title">⚔️ ГЛАВНОЕ МЕНЮ ⚔️</div><a href="https://mmobitva.ru" target="_blank">mmobitva.ru</a></div>
    <div class="button-grid">
        <button class="main-btn" onclick="location.href='main.html'">📦 Предметы<span>Просмотр и поиск</span></button>
        <button class="main-btn" onclick="alert('🚧 В разработке!')">🗺️ Квесты<span>Выполнение квестов</span></button>
        <button class="main-btn" onclick="location.href='demon.html'">🛡️ Круги демона<span>Пробуди силу</span></button>
        <button class="main-btn" onclick="location.href='totem.html'">🧪 Тотем клана<span>Улучшение</span></button>
        <button class="main-btn" onclick="openRunesModal()">✨ Руны<span>Изучай символы</span></button>
        <button class="main-btn" onclick="alert('🚧 В разработке!')">🕵️ Секретные вещи<span>Редкие находки</span></button>
        <button class="main-btn" onclick="alert('🚧 В разработке!')">🌟 Временные эффекты<span>Усиления</span></button>
        <button class="main-btn" onclick="alert('🚧 В разработке!')">⚖️ Аукцион<span>Купить/продать</span></button>
        <button class="main-btn" onclick="location.href='news.html'">📰 Новости<span>История новостей</span></button>
        <button class="main-btn" onclick="location.href='contacts.html'">📬 Контакты<span>Связаться</span></button>
    </div>
    <div class="news-section"><h2>📢 Последние новости</h2><div id="latestNewsContainer"></div><div style="margin-top:15px;"><button class="cat-btn" onclick="location.href='news.html'">📰 Все новости →</button></div></div>
</div>
<div id="runesModal" class="runes-modal"><div class="runes-modal-content"><div class="runes-modal-title">✨ Руны</div><div class="runes-modal-subtitle">Выберите локацию</div><div class="runes-choices"><div class="runes-choice-btn" onclick="location.href='master.html'"><div class="runes-choice-icon">🏰</div><div class="runes-choice-name">Мастер рун</div></div><div class="runes-choice-btn" onclick="location.href='druids.html'"><div class="runes-choice-icon">🌿</div><div class="runes-choice-name">Холм Друидов</div></div></div><div><button class="runes-modal-close" onclick="closeRunesModal()">Закрыть</button></div></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script src="js/common.js"></script>
<script>
if(!checkAuth()) { window.location.href = 'auth.html'; }
async function loadLatestNews() {
    const news = await getNews();
    const latest = news.slice(0, 3);
    const c = document.getElementById('latestNewsContainer');
    if(!c) return;
    if(latest.length === 0) { c.innerHTML = '<div>📭 Новостей пока нет</div>'; return; }
    let html = '';
    latest.forEach(i => { html += `<div style="margin-bottom:15px;"><span style="font-size:11px;color:#c7ba00;">${new Date(i.date).toLocaleDateString('ru-RU')}</span><div style="font-weight:bold;color:#d4b35a;margin:5px 0;">${escapeHtml(i.title)}</div><div style="font-size:12px;color:#a0a0a0;">${escapeHtml(i.content.substring(0,500))}${i.content.length>300?'...':''}</div></div>`; });
    c.innerHTML = html;
}
document.addEventListener('DOMContentLoaded', function() { loadLatestNews(); displayAdminPanel(); });
</script>
</body>
</html>
