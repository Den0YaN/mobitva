<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мастер рун - Автобаттл MMO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrapper">
    <div id="adminPanel" style="display:none;">
        <div class="admin-panel">
            <div class="admin-info">
                <div class="admin-avatar">👑</div>
                <div>
                    <div class="admin-name" id="adminName"></div>
                    <div class="admin-role">Администратор</div>
                </div>
                <div class="admin-badge">ADMIN</div>
            </div>
            <div class="admin-actions">
                <button class="admin-btn" onclick="openAdminPanel()">⚙️ Управление</button>
                <button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <div id="userPanel" style="display:none;">
        <div class="admin-panel">
            <div class="admin-info">
                <div class="admin-avatar">👤</div>
                <div>
                    <div class="admin-name" id="userName"></div>
                    <div class="admin-role">Пользователь</div>
                </div>
            </div>
            <div class="admin-actions">
                <button class="admin-btn logout-btn" onclick="logout()">🚪 Выйти</button>
            </div>
        </div>
    </div>

    <div class="header-wrapper">
        <a href="https://mobitva.net" target="_blank">mobitva.net</a>
        <div class="site-title">🏰 МАСТЕР РУН 🏰</div>
        <a href="https://mmobitva.ru" target="_blank">mmobitva.ru</a>
    </div>
    <div class="categories">
        <button class="cat-btn" onclick="location.href='index.html'">🏠 Главная</button>
        <button class="cat-btn" onclick="location.reload()">🔄 Обновить</button>
    </div>

    <div class="runes-grid" id="runes-container"></div>
</div>

<div id="runeModal" class="rune-modal" style="display:none!important">
    <div class="rune-modal-content">
        <div class="rune-modal-header">
            <div class="rune-modal-close" onclick="closeRuneModal()">✕</div>
            <div class="rune-modal-icon">
                <div class="item-icon shop-icon" id="modalIcon"
                     style="width:80px;height:80px;background-image:url('img/shop.png');background-repeat:no-repeat;"></div>
            </div>
            <div class="rune-modal-title" id="modalTitle"></div>
            <div class="rune-modal-subtitle" id="modalSubtitle"></div>
        </div>
        <div class="rune-modal-body">
            <div class="rune-modal-stats">
                <div class="rune-modal-stats-title">📊 ХАРАКТЕРИСТИКИ</div>
                <div id="modalStats"></div>
            </div>
            <div class="rune-modal-description" id="modalDescription"></div>
        </div>
        <div class="rune-modal-footer"><button class="rune-modal-btn" onclick="closeRuneModal()">Закрыть</button></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/db.js"></script>
<script src="js/common.js"></script>
<script src="js/statico.js"></script>
<script>
const currentUser = checkAuth(); 
if(!currentUser) window.location.href = 'auth.html';

let masterRunes = {};

async function loadMaster() {
    const data = await getMasterRunes();
    masterRunes = {};
    data.forEach(r => { masterRunes[r.id] = r; });
}

async function renderMaster() {
    await loadMaster();
    const container = document.getElementById('runes-container');
    if(!container) return;

    container.innerHTML = '';

    Object.values(masterRunes).forEach(r => {
        const card = document.createElement('div');
        card.className = 'rune-card';
        card.onclick = () => openRuneModal(r.id);

        const header = document.createElement('div');
        header.className = 'rune-header';

        const icon = document.createElement('div');
        icon.className = 'rune-icon shop-icon';
        icon.style.setProperty('--row', r.icon_row);
        icon.style.setProperty('--col', r.icon_col);

        const title = document.createElement('div');
        title.className = 'rune-title';

        const nameEl = document.createElement('div');
        nameEl.className = 'rune-name';
        nameEl.textContent = r.name;

        const levelEl = document.createElement('div');
        levelEl.className = 'rune-level';
        levelEl.textContent = `📊 Уровень ${r.level}`;

        title.append(nameEl, levelEl);
        header.append(icon, title);
        card.appendChild(header);

        const statsContainer = document.createElement('div');
        statsContainer.className = 'rune-stats';
        renderStats(r.stats, statsContainer);
        card.appendChild(statsContainer);

        const desc = document.createElement('div');
        desc.className = 'rune-description';
        desc.textContent = r.description;
        card.appendChild(desc);

        container.appendChild(card);
    });
}

function openRuneModal(id) {
    const r = masterRunes[id];
    if(!r) return;

    const iconEl = document.getElementById('modalIcon');
    iconEl.style.backgroundPosition = `-${r.icon_col * 80}px -${r.icon_row * 80}px`;

    document.getElementById('modalTitle').innerText = r.name;
    document.getElementById('modalSubtitle').innerText = `📊 Уровень ${r.level}`;
    document.getElementById('modalDescription').innerText = r.description;

    const statsContainer = document.getElementById('modalStats');
    renderStats(r.stats, statsContainer);

    document.getElementById('runeModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}

function closeRuneModal() {
    document.getElementById('runeModal').style.display = 'none';
    document.body.style.overflow = '';
}

renderMaster();
document.addEventListener('DOMContentLoaded', displayAdminPanel);
</script>
</body>
</html>
